name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets
        run: |
          # Base64-encode the Groq key so View-Source / regex scrapers don't see "gsk_*"
          # in the HTML. This is obfuscation, not encryption — anyone with DevTools can
          # still call atob() on it. But it stops casual scraping and bot harvesters.
          GROQ_API_KEY_B64=$(printf '%s' "${GROQ_API_KEY}" | base64 -w0)
          sed -i "s|__GROQ_API_KEY_B64__|${GROQ_API_KEY_B64}|g" docs/index.html
          sed -i "s|__WORKER_URL__|${WORKER_URL}|g" docs/index.html
          sed -i "s|__WORKER_KEY__|${WORKER_KEY}|g" docs/index.html
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_KEY: ${{ secrets.WORKER_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
